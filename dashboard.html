<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Pomodoro Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #6366f1;
      font-size: 2.5rem;
      font-weight: 800;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 30px;
    }

    .tab {
      background: #1e1e24;
      color: #a0a0b0;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 25px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.2s;
    }

    .tab:hover {
      background: #2a2a35;
    }

    .tab.active {
      background: #6366f1;
      color: #ffffff;
      border-color: #6366f1;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .stats-card {
      background: #1e1e24;
      padding: 30px 20px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform 0.2s;
      position: relative;
    }

    .stats-card:hover {
      transform: translateY(-5px);
    }

    .stat-value {
      font-size: 36px;
      font-weight: 800;
      color: #10b981;
      margin-bottom: 8px;
    }

    .stat-pause .stat-value {
      color: #f59e0b;
    }

    .stat-label {
      font-size: 14px;
      color: #a0a0b0;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
    }

    .stat-delta {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 600;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
    }

    .chart-container {
      background: #1e1e24;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Productivity Dashboard</h1>
    
    <div class="tabs">
      <button id="tabToday" class="tab active" onclick="switchTab('today')">Today</button>
      <button id="tabCumulative" class="tab" onclick="switchTab('cumulative')">Cumulative</button>
    </div>

    <!-- TODAY VIEW -->
    <div id="viewToday" class="view active">
      <div class="stats-grid">
        <div class="stats-card">
          <div class="stat-value" id="todayWorkVal">0m</div>
          <div class="stat-label">Work Today</div>
          <div class="stat-delta" id="todayWorkDelta"></div>
        </div>
        <div class="stats-card stat-pause">
          <div class="stat-value" id="todayPauseVal">0m</div>
          <div class="stat-label">Pause Today</div>
          <div class="stat-delta" id="todayPauseDelta"></div>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="todayChart"></canvas>
      </div>
    </div>

    <!-- CUMULATIVE VIEW -->
    <div id="viewCumulative" class="view">
      <div class="stats-grid">
        <div class="stats-card">
          <div class="stat-value" id="totalHoursVal">0.00h</div>
          <div class="stat-label">Total Hours Cumulatively</div>
        </div>
        <div class="stats-card stat-pause">
          <div class="stat-value" id="bestDayVal">0.00h</div>
          <div class="stat-label" id="bestDayLabel">Best Day (-)</div>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="chart-container">
          <canvas id="dailyChart"></canvas>
        </div>
        <div class="chart-container">
          <canvas id="topicChart"></canvas>
        </div>
      </div>
    </div>

  </div>

  <script>
    const fs = require('fs');
    const path = require('path');

    function normalizeTopic(topic) {
      if (!topic) return 'General';
      let t = topic.trim().toLowerCase();
      const map = {
        'coellge': 'College',
        'college': 'College',
        'iterview': 'Interview',
        'inteview': 'Interview',
        'interview': 'Interview',
        'dsa': 'DSA',
        'coding': 'Coding',
        'build': 'Build'
      };
      return map[t] || (t.charAt(0).toUpperCase() + t.slice(1));
    }

    async function loadData() {
      try {
        const dataFile = path.join(__dirname, 'data.json');
        if (!fs.existsSync(dataFile)) {
          throw new Error('Data file not found.');
        }
        const data = JSON.parse(fs.readFileSync(dataFile, 'utf8'));

        const dailyTotals = {};
        const dailyPauses = {};
        const cumulativeTopicTotals = {};
        
        const todayTopicTotals = {};
        const todayPauseTotals = {};

        let totalMinutes = 0;
        let bestDay = { date: '-', minutes: 0 };

        const now = new Date();
        const yest = new Date(now);
        yest.setDate(yest.getDate() - 1);

        const fmtDate = (d) => {
          const y = d.getFullYear();
          const m = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          return `${y}-${m}-${day}`;
        };

        const todayStr = fmtDate(now);
        const yestStr = fmtDate(yest);

        data.forEach(session => {
          if (!session.timestamp) return;
          const dateObj = new Date(session.timestamp);
          const sessionDate = fmtDate(dateObj);

          const topic = normalizeTopic(session.topic);
          const mins = session.minutes || 0;
          const pmins = session.pauseMinutes || 0;
          
          dailyTotals[sessionDate] = (dailyTotals[sessionDate] || 0) + mins;
          dailyPauses[sessionDate] = (dailyPauses[sessionDate] || 0) + pmins;
          
          cumulativeTopicTotals[topic] = (cumulativeTopicTotals[topic] || 0) + mins;
          totalMinutes += mins;

          if (sessionDate === todayStr) {
            todayTopicTotals[topic] = (todayTopicTotals[topic] || 0) + mins;
            todayPauseTotals[topic] = (todayPauseTotals[topic] || 0) + pmins;
          }
        });

        // Find best day
        for (const [date, mins] of Object.entries(dailyTotals)) {
          if (mins > bestDay.minutes) {
            bestDay = { date, minutes: mins };
          }
        }

        // Today Stats Calculation
        const todayWork = dailyTotals[todayStr] || 0;
        const yestWork = dailyTotals[yestStr] || 0;
        const todayPause = dailyPauses[todayStr] || 0;
        const yestPause = dailyPauses[yestStr] || 0;

        const formatMins = (m) => Math.round(m) + 'm';
        
        const formatWorkDelta = (curr, prev) => {
          const diff = curr - prev;
          if (diff > 0) return `<span style="color:#10b981">↑ +${formatMins(diff)} vs yesterday</span>`;
          if (diff < 0) return `<span style="color:#ef4444">↓ ${formatMins(diff)} vs yesterday</span>`;
          return `<span style="color:#a0a0b0">= Same as yesterday</span>`;
        };

        const formatPauseDelta = (curr, prev) => {
          const diff = curr - prev;
          // More pause is red, less pause is green
          if (diff > 0) return `<span style="color:#ef4444">↑ +${formatMins(diff)} vs yesterday</span>`;
          if (diff < 0) return `<span style="color:#10b981">↓ ${formatMins(diff)} vs yesterday</span>`;
          return `<span style="color:#a0a0b0">= Same as yesterday</span>`;
        };

        document.getElementById('todayWorkVal').innerText = formatMins(todayWork);
        document.getElementById('todayWorkDelta').innerHTML = formatWorkDelta(todayWork, yestWork);

        document.getElementById('todayPauseVal').innerText = formatMins(todayPause);
        document.getElementById('todayPauseDelta').innerHTML = formatPauseDelta(todayPause, yestPause);

        // Render Today Chart
        const todayTopics = Object.keys(todayTopicTotals);
        const ctxToday = document.getElementById('todayChart').getContext('2d');
        new Chart(ctxToday, {
          type: 'bar',
          data: {
            labels: todayTopics.length ? todayTopics : ['No Data'],
            datasets: [{
              label: 'Minutes Worked',
              data: todayTopics.length ? todayTopics.map(t => Math.round(todayTopicTotals[t])) : [0],
              backgroundColor: 'rgba(16, 185, 129, 0.7)',
              borderColor: 'rgba(16, 185, 129, 1)',
              borderWidth: 1,
              borderRadius: 4
            }, {
              label: 'Minutes Paused',
              data: todayTopics.length ? todayTopics.map(t => Math.round(todayPauseTotals[t])) : [0],
              backgroundColor: 'rgba(245, 158, 11, 0.7)',
              borderColor: 'rgba(245, 158, 11, 1)',
              borderWidth: 1,
              borderRadius: 4
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { labels: { color: '#ffffff' } },
              title: { display: true, text: "Today's Breakdown", color: '#ffffff', font: { size: 18, family: "'Inter', sans-serif", weight: '600' } }
            },
            scales: {
              y: { beginAtZero: true, grid: { color: 'rgba(255, 255, 255, 0.1)' }, ticks: { color: '#a0a0b0' } },
              x: { grid: { display: false }, ticks: { color: '#a0a0b0' } }
            }
          }
        });

        // Cumulative Stats
        const totalHours = (totalMinutes / 60).toFixed(2);
        const bestDayHours = (bestDay.minutes / 60).toFixed(2);

        document.getElementById('totalHoursVal').innerText = totalHours + 'h';
        document.getElementById('bestDayVal').innerText = bestDayHours + 'h';
        document.getElementById('bestDayLabel').innerText = `Best Day (${bestDay.date})`;

        // Daily Trend Chart
        const sortedDates = Object.keys(dailyTotals).sort();
        const dailyData = sortedDates.map(date => (dailyTotals[date] / 60).toFixed(2));

        const ctxDaily = document.getElementById('dailyChart').getContext('2d');
        new Chart(ctxDaily, {
          type: 'line',
          data: {
            labels: sortedDates,
            datasets: [{
              label: 'Hours Worked',
              data: dailyData,
              backgroundColor: 'rgba(99, 102, 241, 0.2)',
              borderColor: 'rgba(99, 102, 241, 1)',
              borderWidth: 2,
              fill: true,
              tension: 0.3,
              pointBackgroundColor: 'rgba(99, 102, 241, 1)',
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { display: false },
              title: {
                display: true,
                text: 'Daily Work Trend',
                color: '#ffffff',
                font: { size: 18, family: "'Inter', sans-serif", weight: '600' }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                ticks: { color: '#a0a0b0' }
              },
              x: {
                grid: { display: false },
                ticks: { color: '#a0a0b0' }
              }
            }
          }
        });

        // Cumulative Topic Chart
        const sortedTopics = Object.keys(cumulativeTopicTotals).sort((a,b) => cumulativeTopicTotals[b] - cumulativeTopicTotals[a]);
        const topicData = sortedTopics.map(t => (cumulativeTopicTotals[t] / 60).toFixed(2));

        const ctxTopic = document.getElementById('topicChart').getContext('2d');
        new Chart(ctxTopic, {
          type: 'bar',
          data: {
            labels: sortedTopics,
            datasets: [{
              label: 'Cumulative Hours',
              data: topicData,
              backgroundColor: 'rgba(16, 185, 129, 0.7)',
              borderColor: 'rgba(16, 185, 129, 1)',
              borderWidth: 1,
              borderRadius: 6
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { display: false },
              title: {
                display: true,
                text: 'Time Allocation by Topic',
                color: '#ffffff',
                font: { size: 18, family: "'Inter', sans-serif", weight: '600' }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                ticks: { color: '#a0a0b0' }
              },
              x: {
                grid: { display: false },
                ticks: { color: '#a0a0b0' }
              }
            }
          }
        });

      } catch (error) {
        console.error(error);
        document.getElementById('todayWorkVal').innerText = "0m";
        document.getElementById('todayPauseVal').innerText = "0m";
      }
    }

    function switchTab(tabId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      
      if (tabId === 'today') {
        document.getElementById('viewToday').classList.add('active');
        document.getElementById('tabToday').classList.add('active');
      } else {
        document.getElementById('viewCumulative').classList.add('active');
        document.getElementById('tabCumulative').classList.add('active');
      }
    }

    loadData();
  </script>
</body>

</html>
